name: ot_fps_check
description: "Small FPS landmark comparison tranche."

checkpoint_root: "${EVOLVE_ROOT}/evolve_checkpoints/collapse_ph"
output_root: "${EVOLVE_ROOT}/gw_outputs/ot_fps_check_L256"

worker_script: "compute_subsample_gw_trajectory.py"

mode: adjacent
ot_method: entropic_gw
landmark_method: fps

n_landmarks: 256
epsilon: 0.5
seed: 17
normalize: start_median
max_iter: 1000
tol: 1.0e-6

workers: 20
blas_threads: 1
overwrite: false

limit_runs: null

filters:
  mechanisms:
    - radial_collapse
    - cluster_tightening
    - cluster_merging
    - projection
    - linear_to_kplane
  geometries: []
  schedules: []
  severities:
    - moderate
    - strong
  noises:
    - 0.0
